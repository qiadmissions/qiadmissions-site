<!doctype html>
<!-- Quintessence — RSVP thank-you (Web3Forms redirect target). noindex. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<meta name="robots" content="noindex">
<title>Thank you — Quintessence</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Mulish:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#f6f4ef; --ink:#191b1f; --soft:#5a5d63; --line:#e2ddd3; --accent:#6d1f2c;
    --serif:'Cormorant Garamond',Georgia,serif; --sans:'Mulish',system-ui,sans-serif; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ background:var(--bg); color:var(--ink); font-family:var(--sans); line-height:1.7;
    min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px 28px; }
  .card{ max-width:54ch; }
  .eyebrow{ font-size:11.5px; letter-spacing:.3em; text-transform:uppercase; color:#9c8049; }
  h1{ font-family:var(--serif); font-weight:600; font-size:clamp(34px,6vw,56px); line-height:1.08; margin:16px 0 0; }
  p{ font-size:18px; color:var(--soft); margin-top:22px; }
  .meta{ font-family:var(--serif); font-size:22px; color:var(--accent); margin-top:24px; }
  .u{ white-space:nowrap; }
  a{ display:inline-block; margin-top:38px; font-size:12.5px; letter-spacing:.16em; text-transform:uppercase;
    text-decoration:none; color:var(--ink); border-bottom:1px solid var(--line); padding-bottom:3px; }
  a:hover{ color:var(--accent); border-color:var(--accent); }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Quintessence</div>
    <h1 class="serif">Your seat is saved.</h1>
    <p>Thank you. We've received your details and will be in touch with your Zoom link — and, if you asked,
       times for a private consultation.</p>
    <div class="meta"><span class="u">The Info Session</span> · <span class="u">Sunday, July 12</span> · <span class="u">8 PM EDT</span></div>
    <a href="/">← Back to Quintessence</a>
  </div>
</body>
</html>
